name: Shibei Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 */2 * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: shibei-digest
  cancel-in-progress: false

env:
  PUBLIC_BASE_URL: https://lxinxin-cloud.github.io/shibei-digest
  BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
  FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

jobs:
  build-notify-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build digest and send notifications
        run: |
          python scripts/shibei_digest.py \
            --public-dir public \
            --output-dir output

      - name: Commit generated state and pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public state
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update Shibei digest"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
