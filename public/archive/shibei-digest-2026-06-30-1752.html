<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>拾贝文章汇总 2026-06-30</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f4ef;
      --fg: #1f2328;
      --muted: #667085;
      --card: #fffdf8;
      --line: #e4ddd2;
      --accent: #0f766e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171717;
        --fg: #efefef;
        --muted: #a3a3a3;
        --card: #222;
        --line: #383838;
        --accent: #5eead4;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.75;
    }
    main {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 28px 16px 48px;
    }
    header {
      padding: 8px 0 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 22px;
    }
    h1 {
      font-size: 30px;
      line-height: 1.2;
      margin: 0 0 10px;
      letter-spacing: 0;
    }
    h2 {
      font-size: 20px;
      margin: 28px 0 12px;
      letter-spacing: 0;
    }
    h3 {
      font-size: 19px;
      line-height: 1.35;
      margin: 6px 0 10px;
      letter-spacing: 0;
    }
    p { margin: 0 0 12px; }
    .sub, .meta, .hint {
      color: var(--muted);
      font-size: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
    }
    .button {
      display: inline-block;
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      padding: 4px 0;
    }
    .empty {
      padding: 24px 0;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>拾贝文章汇总 2026-06-30</h1>
      <p class="sub">生成时间：2026-06-30 17:52 · 共 0 篇 · 已过滤广告/优惠/推广/小说</p>
    </header>
    <p class="empty">过去周期内没有发现新的合适文章。</p>
  </main>
</body>
</html>
